[Rainmeter]
Update=1000
AccurateText=1
@Include=#@#Application Dock\conf\Variables.inc

[Variables]
PanelColor=30,30,30,240
TextColor=255,255,255
HighlightColor=0,255,0
DeleteColor=255,80,80
; --- UPDATED PATHS ---
VarFile=#@#Application Dock\conf\Variables.inc
RMExe=D:\programms\rainmeter\Rainmeter.exe

; --- STYLES ---

[StyleLabel]
FontFace=Segoe UI
FontSize=10
FontColor=#TextColor#
AntiAlias=1
X=20
Y=12R
W=160
ClipString=1
DynamicVariables=1

[StyleButton]
FontFace=Segoe UI
FontSize=9
FontColor=#HighlightColor#
StringStyle=Bold
AntiAlias=1
Padding=5,4,5,4
SolidColor=255,255,255,10
MouseOverAction=[!SetOption #CURRENTSECTION# SolidColor "255,255,255,30"][!UpdateMeter #CURRENTSECTION#][!Redraw]
MouseLeaveAction=[!SetOption #CURRENTSECTION# SolidColor "255,255,255,10"][!UpdateMeter #CURRENTSECTION#][!Redraw]

[StyleReset]
FontFace=Segoe UI
FontSize=9
FontColor=#DeleteColor#
StringStyle=Bold
AntiAlias=1
Padding=5,4,5,4
SolidColor=255,255,255,10
MouseOverAction=[!SetOption #CURRENTSECTION# SolidColor "255,80,80,40"][!UpdateMeter #CURRENTSECTION#][!Redraw]
MouseLeaveAction=[!SetOption #CURRENTSECTION# SolidColor "255,255,255,10"][!UpdateMeter #CURRENTSECTION#][!Redraw]

; --- BACKGROUND ---

[Background]
Meter=Shape
Shape=Rectangle 0,0,450,650,10 | Fill Color #PanelColor# | StrokeWidth 0

[Title]
Meter=String
Text="DOCK MANAGER (10 SLOTS)"
X=225
Y=15
StringAlign=Center
FontFace=Segoe UI
FontSize=14
FontWeight=700
FontColor=#HighlightColor#
AntiAlias=1

; --- SLOT GENERATOR ---

; Row 1
[Slot1Text]
Meter=String
MeterStyle=StyleLabel
Text="1. #App1Path#"
Y=60
[Slot1File]
Meter=String
MeterStyle=StyleButton
Text="FILE"
X=200
Y=0r
LeftMouseUpAction=["powershell.exe" -ExecutionPolicy Bypass -Command "Add-Type -AssemblyName System.Windows.Forms; $f=New-Object System.Windows.Forms.OpenFileDialog; if($f.ShowDialog()-eq'OK'){$path=$f.FileName; $content=Get-Content '#VarFile#'; $content -replace '^App1Path=.*', ('App1Path='+$path) | Set-Content '#VarFile#'; & '#RMExe#' !RefreshApp}"]

[Slot1Icon]
Meter=String
MeterStyle=StyleButton
Text="ICON"
X=10R
Y=0r
LeftMouseUpAction=["powershell.exe" -ExecutionPolicy Bypass -Command "Add-Type -AssemblyName System.Windows.Forms; $f=New-Object System.Windows.Forms.OpenFileDialog; if($f.ShowDialog()-eq'OK'){$path=$f.FileName; $content=Get-Content '#VarFile#'; $content -replace '^App1Icon=.*', ('App1Icon='+$path) | Set-Content '#VarFile#'; & '#RMExe#' !RefreshApp}"]

[Slot1Reset]
Meter=String
MeterStyle=StyleReset
Text="RESET"
X=10R
Y=0r
LeftMouseUpAction=[!WriteKeyValue Variables App1Path "---" "#VarFile#"][!WriteKeyValue Variables App1Icon "---" "#VarFile#"][!Refresh *]

