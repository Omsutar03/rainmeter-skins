[Rainmeter]
Update=1000
AccurateText=1
@Include=#@#Application Dock\conf\Variables.inc

[Variables]
PanelColor=30,30,30,240
TextColor=255,255,255
HighlightColor=0,255,0
DeleteColor=255,80,80
VarFile=#@#Application Dock\conf\Variables.inc
RMExe=D:\programms\rainmeter\Rainmeter.exe
SelectedSlot=0
SwapIcon=#@#Application Dock\Images\swap.png

[MeasureSourcePath]
Measure=String
String=""
UpdateDivider=-1

[MeasureSourceIcon]
Measure=String
String=""
UpdateDivider=-1

; --- STYLES ---

[StyleLabel]
FontFace=Segoe UI
FontSize=10
FontColor=#TextColor#
AntiAlias=1
X=20
Y=12R
W=160
ClipString=1
DynamicVariables=1
RegExpSubstitute=1
Substitute="^.*\\":""

[StyleButton]
FontFace=Segoe UI
FontSize=9
FontColor=#HighlightColor#
StringStyle=Bold
AntiAlias=1
Padding=5,4,5,4
SolidColor=255,255,255,10
MouseOverAction=[!SetOption #CURRENTSECTION# SolidColor "255,255,255,30"][!UpdateMeter #CURRENTSECTION#][!Redraw]
MouseLeaveAction=[!SetOption #CURRENTSECTION# SolidColor "255,255,255,10"][!UpdateMeter #CURRENTSECTION#][!Redraw]

[StyleReset]
FontFace=Segoe UI
FontSize=9
FontColor=#DeleteColor#
StringStyle=Bold
AntiAlias=1
Padding=5,4,5,4
SolidColor=255,255,255,10
MouseOverAction=[!SetOption #CURRENTSECTION# SolidColor "255,80,80,40"][!UpdateMeter #CURRENTSECTION#][!Redraw]
MouseLeaveAction=[!SetOption #CURRENTSECTION# SolidColor "255,255,255,10"][!UpdateMeter #CURRENTSECTION#][!Redraw]

[StyleSwap]
W=16
H=16
X=10R
Y=2r
; Base opacity is low
ImageAlpha=100
DynamicVariables=1
; Hover effect
MouseOverAction=[!SetOption #CURRENTSECTION# ImageAlpha 255][!UpdateMeter #CURRENTSECTION#][!Redraw]
MouseLeaveAction=[!SetOption #CURRENTSECTION# ImageAlpha 100][!UpdateMeter #CURRENTSECTION#][!Redraw]
; Highlighting logic: If this is the selected slot, make it opaque and Green
Group=SwapButtons

; --- BACKGROUND ---

[Background]
Meter=Shape
Shape=Rectangle 0,0,450,500,10 | Fill Color #PanelColor# | StrokeWidth 0

[Title]
Meter=String
Text="DOCK MANAGER (10 SLOTS)"
X=225
Y=15
StringAlign=Center
FontFace=Segoe UI
FontSize=14
FontWeight=700
FontColor=#HighlightColor#
AntiAlias=1

; --- SLOT GENERATOR ---

; Row 1
[MeasureApp1Name]
Measure=String
String=#App1Path#
RegExpSubstitute=1
Substitute="^.*\\":""
DynamicVariables=1

[Slot1Text]
Meter=String
MeterStyle=StyleLabel
; We use MeasureName to pull the "cleaned" string
MeasureName=MeasureApp1Name
; %1 acts as a placeholder for the MeasureName value
Text="1. %1"
Y=60

[Slot1File]
Meter=String
MeterStyle=StyleButton
Text="FILE"
X=200
Y=0r
LeftMouseUpAction=["powershell.exe" -ExecutionPolicy Bypass -Command "Add-Type -AssemblyName System.Windows.Forms; $f=New-Object System.Windows.Forms.OpenFileDialog; if($f.ShowDialog()-eq'OK'){$path=$f.FileName; $content=Get-Content '#VarFile#'; $content -replace '^App1Path=.*', ('App1Path='+$path) | Set-Content '#VarFile#'; & '#RMExe#' !RefreshApp}"]

[Slot1IconButton]
Meter=String
MeterStyle=StyleButton
Text="ICON"
X=10R
Y=0r
LeftMouseUpAction=["powershell.exe" -ExecutionPolicy Bypass -Command "Add-Type -AssemblyName System.Windows.Forms; $f=New-Object System.Windows.Forms.OpenFileDialog; if($f.ShowDialog()-eq'OK'){$path=$f.FileName; $content=Get-Content '#VarFile#'; $content -replace '^App1Icon=.*', ('App1Icon='+$path) | Set-Content '#VarFile#'; & '#RMExe#' !RefreshApp}"]

[Slot1Reset]
Meter=String
MeterStyle=StyleReset
Text="RESET"
X=10R
Y=0r
LeftMouseUpAction=[!WriteKeyValue Variables App1Path "---" "#VarFile#"][!WriteKeyValue Variables App1Icon "---" "#VarFile#"][!Refresh *]

[Slot1Swap]
Meter=Image
MeterStyle=StyleSwap
ImageName=#SwapIcon#
; Hide if THIS is the selected slot
Hidden=(#SelectedSlot# == 1 ? 1 : 0)
; Highlight if a swap is active globally
ImageColor=(#SelectedSlot# > 0 ? #HighlightColor# : 255,255,255)
ImageAlpha=(#SelectedSlot# > 0 ? 255 : 100)
LeftMouseUpAction=[!IfCondition #SelectedSlot# == 0][!WriteKeyValue Variables App0Path "#App1Path#" "#VarFile#"][!WriteKeyValue Variables App0Icon "#App1Icon#" "#VarFile#"][!SetVariable SelectedSlot 1][!UpdateMeter *][!Redraw][!ElseIf #SelectedSlot# == 1][!SetVariable SelectedSlot 0][!UpdateMeter *][!Redraw][!Else][!WriteKeyValue Variables App#SelectedSlot#Path "#App1Path#" "#VarFile#"][!WriteKeyValue Variables App#SelectedSlot#Icon "#App1Icon#" "#VarFile#"][!WriteKeyValue Variables App1Path "#App0Path#" "#VarFile#"][!WriteKeyValue Variables App1Icon "#App0Icon#" "#VarFile#"][!SetVariable SelectedSlot 0][!Refresh *][!EndIf]

