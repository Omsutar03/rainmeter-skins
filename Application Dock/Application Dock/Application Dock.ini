[Rainmeter]
Update=1000
AccurateText=1
@Include=#@#Application Dock\conf\Variables.inc

[Metadata]
Name=Minimal Dock
Author=YourName
Information=A minimal semi-transparent docking bar.
Version=1.0

; --- VARIABLES ---
[Variables]
BgColor=0,0,0,120
IconSize=40
Spacing=15
DockHeight=60

; These track whether each slot is active (1) or empty (0)
; They are set by the String measures below using IfMatch
App1Active=0
App2Active=0
App3Active=0
App4Active=0
App5Active=0
App6Active=0
App7Active=0
App8Active=0
App9Active=0
App10Active=0

; --- MEASURES ---
; Rainmeter Calc formulas are purely numeric — string comparison like
; (#App1Path# = "---") does NOT work. We use String measures with
; IfMatch instead, which CAN compare strings, then store 0 or 1
; into a variable for the Calc measures to use numerically.
 
[MeasureApp1Active]
Measure=String
String=#App1Path#
IfMatch=---
IfMatchAction=[!SetVariable App1Active 0]
IfNotMatchAction=[!SetVariable App1Active 1]
DynamicVariables=1
 
[MeasureApp2Active]
Measure=String
String=#App2Path#
IfMatch=---
IfMatchAction=[!SetVariable App2Active 0]
IfNotMatchAction=[!SetVariable App2Active 1]
DynamicVariables=1
 
[MeasureApp3Active]
Measure=String
String=#App3Path#
IfMatch=---
IfMatchAction=[!SetVariable App3Active 0]
IfNotMatchAction=[!SetVariable App3Active 1]
DynamicVariables=1
 
[MeasureApp4Active]
Measure=String
String=#App4Path#
IfMatch=---
IfMatchAction=[!SetVariable App4Active 0]
IfNotMatchAction=[!SetVariable App4Active 1]
DynamicVariables=1
 
[MeasureApp5Active]
Measure=String
String=#App5Path#
IfMatch=---
IfMatchAction=[!SetVariable App5Active 0]
IfNotMatchAction=[!SetVariable App5Active 1]
DynamicVariables=1
 
[MeasureApp6Active]
Measure=String
String=#App6Path#
IfMatch=---
IfMatchAction=[!SetVariable App6Active 0]
IfNotMatchAction=[!SetVariable App6Active 1]
DynamicVariables=1
 
[MeasureApp7Active]
Measure=String
String=#App7Path#
IfMatch=---
IfMatchAction=[!SetVariable App7Active 0]
IfNotMatchAction=[!SetVariable App7Active 1]
DynamicVariables=1
 
[MeasureApp8Active]
Measure=String
String=#App8Path#
IfMatch=---
IfMatchAction=[!SetVariable App8Active 0]
IfNotMatchAction=[!SetVariable App8Active 1]
DynamicVariables=1
 
[MeasureApp9Active]
Measure=String
String=#App9Path#
IfMatch=---
IfMatchAction=[!SetVariable App9Active 0]
IfNotMatchAction=[!SetVariable App9Active 1]
DynamicVariables=1
 
[MeasureApp10Active]
Measure=String
String=#App10Path#
IfMatch=---
IfMatchAction=[!SetVariable App10Active 0]
IfNotMatchAction=[!SetVariable App10Active 1]
DynamicVariables=1

[MeasureTotalActive]
Measure=Calc
Formula=#App1Active# + #App2Active# + #App3Active# + #App4Active# + #App5Active# + #App6Active# + #App7Active# + #App8Active# + #App9Active# + #App10Active#
; We add a small "Floor" so the dock is never 0 width
IfCondition=MeasureTotalActive < 1
IfTrueAction=[!SetVariable DockWidth 10]
IfFalseAction=[!SetVariable DockWidth "(([MeasureTotalActive] * #IconSize#) + (([MeasureTotalActive] + 1) * #Spacing#))"]
;IfFalseAction=[!SetVariable DockWidth 100]
DynamicVariables=1

; --- STYLES ---
[StyleIcon]
W=#IconSize#
H=#IconSize#
Y=((#DockHeight# - #IconSize#) / 2)
PreserveAspectRatio=1
AntiAlias=1
DynamicVariables=1
MouseOverAction=[!SetOption #CURRENTSECTION# ImageAlpha 150][!UpdateMeter #CURRENTSECTION#][!Redraw]
MouseLeaveAction=[!SetOption #CURRENTSECTION# ImageAlpha 255][!UpdateMeter #CURRENTSECTION#][!Redraw]

; --- METERS ---

[Background]
Meter=Shape
; Uses the #DockWidth# variable calculated by the MeasureTotalActive measure
;Shape=Rectangle 0,0,((#IconSize# + #Spacing#) * 5 + #Spacing#),#DockHeight#,10 | Fill Color #BgColor# | StrokeWidth 0
Shape=Rectangle 0,0,#DockWidth#,#DockHeight#,10 | Fill Color #BgColor# | StrokeWidth 0
LeftMouseDoubleClickAction=!ToggleConfig "#ROOTCONFIG#\Application Dock\DockSettings" "DockSettings.ini"
DynamicVariables=1

[Icon1]
Meter=Image
MeterStyle=StyleIcon
ImageName=#App1Icon#
X=#Spacing#
Hidden=(#App1Active# < 1 ? 1 : 0)
LeftMouseUpAction=["#App1Path#"]

[Icon2]
Meter=Image
MeterStyle=StyleIcon
ImageName=#App2Icon#
; If Icon 1 is hidden, this snaps back. If Icon 2 is hidden, this stays hidden.
;X=#Spacing#R
X=(#App2Active# < 1 ? 0 : #Spacing#)R
Hidden=(#App2Active# < 1 ? 1 : 0)
LeftMouseUpAction=["#App2Path#"]

[Icon3]
Meter=Image
MeterStyle=StyleIcon
ImageName=#App3Icon#
X=(#App3Active# < 1 ? 0 : #Spacing#)R
Hidden=(#App3Active# < 1 ? 1 : 0)
LeftMouseUpAction=["#App3Path#"]

[Icon4]
Meter=Image
MeterStyle=StyleIcon
ImageName=#App4Icon#
X=(#App4Active# < 1 ? 0 : #Spacing#)R
Hidden=(#App4Active# < 1 ? 1 : 0)
LeftMouseUpAction=["#App4Path#"]

