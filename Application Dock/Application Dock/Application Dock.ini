Meter=Image
MeterStyle=StyleIcon
ImageName=#App5Icon#
X=(#App5Active# < 1 ? 0 : #Spacing#)R
Hidden=(#App5Active# < 1 ? 1 : 0)
LeftMouseUpAction=["#App5Path#"]

[Icon6]
Meter=Image
MeterStyle=StyleIcon
ImageName=#App6Icon#
X=(#App6Active# < 1 ? 0 : #Spacing#)R
Hidden=(#App6Active# < 1 ? 1 : 0)
LeftMouseUpAction=["#App6Path#"]

[Icon7]
Meter=Image
MeterStyle=StyleIcon
ImageName=#App7Icon#
X=(#App7Active# < 1 ? 0 : #Spacing#)R
Hidden=(#App7Active# < 1 ? 1 : 0)
LeftMouseUpAction=["#App7Path#"]

[Icon8]
Meter=Image
MeterStyle=StyleIcon
ImageName=#App8Icon#
X=(#App8Active# < 1 ? 0 : #Spacing#)R
Hidden=(#App8Active# < 1 ? 1 : 0)
LeftMouseUpAction=["#App8Path#"]

[Icon9]
Meter=Image
MeterStyle=StyleIcon
ImageName=#App9Icon#
X=(#App9Active# < 1 ? 0 : #Spacing#)R
Hidden=(#App9Active# < 1 ? 1 : 0)
LeftMouseUpAction=["#App9Path#"]

[Icon10]
Meter=Image
MeterStyle=StyleIcon
ImageName=#App10Icon#
X=(#App10Active# < 1 ? 0 : #Spacing#)R
