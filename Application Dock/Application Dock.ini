[Rainmeter]
Update=1000
AccurateText=1

[Metadata]
Name=Minimal Dock
Author=YourName
Information=A minimal semi-transparent docking bar.
Version=1.0


; --- VARIABLES ---
; Customize colors, sizes, and paths here
[Variables]
; RGBA: Red, Green, Blue, Alpha (0-255). 120 is semi-transparent.
BgColor=0,0,0,120
IconSize=40
Spacing=15
; Total height of the dock
DockHeight=60

; --- STYLES ---
[StyleIcon]
W=#IconSize#
H=#IconSize#
Y=((#DockHeight# - #IconSize#) / 2)
PreserveAspectRatio=1
AntiAlias=1
DynamicVariables=1
; Visual feedback on hover
MouseOverAction=[!SetOption #CURRENTSECTION# ImageAlpha 150][!UpdateMeter #CURRENTSECTION#][!Redraw]
MouseLeaveAction=[!SetOption #CURRENTSECTION# ImageAlpha 255][!UpdateMeter #CURRENTSECTION#][!Redraw]

; --- METERS ---

; 1. The Background Bar
[Background]
Meter=Shape
; Note: "Fill Color" must be "Fill Color R,G,B,A"
Shape=Rectangle 0,0,((#IconSize# + #Spacing#) * 4 + #Spacing#),#DockHeight#,10 | Fill Color 0,0,0,120 | StrokeWidth 0; Shape=Rectangle 0,0,250,60,10

; 2. Application Icons
[Icon1]
Meter=Image
MeterStyle=StyleIcon
ImageName=#@#Images\Application Dock\FIle_Explorer.png
X=#Spacing#
LeftMouseUpAction=["explorer.exe"]
ToolTipText="This PC"

[Icon2]
Meter=Image
MeterStyle=StyleIcon
ImageName=#@#Images\Application Dock\Google_Chrome_icon.png
X=#Spacing#R
LeftMouseUpAction=["chrome.exe"]
ToolTipText="Google Chrome"

[Icon3]
Meter=Image
MeterStyle=StyleIcon
ImageName=#@#Images\Application Dock\Brave_Browser.png
X=#Spacing#R
LeftMouseUpAction=["brave.exe"]
ToolTipText="Brave"

[Icon4]
Meter=Image
MeterStyle=StyleIcon
ImageName=#@#Images\Application Dock\Crownless.png
X=#Spacing#R
LeftMouseUpAction=["C:\Program Files\Wuthering Waves\launcher.exe"]
ToolTipText="Wuthering Waves"